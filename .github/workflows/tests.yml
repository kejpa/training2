name: Tests

on: [push, pull_request]

jobs:
  tests:
    name: Tests PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}

    strategy:
      fail-fast: false
      matrix:
        php: [8.2]
        experimental: [false]
        include:
          - php: 8.3
            experimental: false
            analysis: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, mbstring
          coverage: xdebug

      - name: Copy .env
        working-directory: ./Backend
        run: cp .env.example .env

      - name: Set environment variables
        run: |
          echo "JWT_SECRET=test-secret-key-for-ci-at-least-32-characters-long" >> $GITHUB_ENV
          echo "JWT_EXPIRATION=3600" >> $GITHUB_ENV
          echo "REFRESH_TOKEN_EXPIRATION=2592000" >> $GITHUB_ENV
          echo "APP_ENV=testing" >> $GITHUB_ENV

      - name: Install dependencies with Composer
        uses: ramsey/composer-install@v3
        with:
          working-directory: ./Backend

      - name: Coding standards
        if: matrix.analysis
        working-directory: ./Backend
        run: vendor/bin/phpcs

      - name: Static analysis
        if: matrix.analysis
        working-directory: ./Backend
        run: vendor/bin/phpstan

      - name: Tests
        working-directory: ./Backend
        run: vendor/bin/phpunit --coverage-clover clover.xml

      - name: Upload coverage results to Coveralls
        if: matrix.analysis
        working-directory: ./Backend
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          composer require php-coveralls/php-coveralls -n -W
          vendor/bin/php-coveralls --coverage_clover=clover.xml -v
