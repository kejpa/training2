name: Tests

on: [push, pull_request]

jobs:
  tests:
    name: Tests PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}

    # Uncomment when you want to test with database
    # services:
    #     mysql:
    #         image: mariadb:11
    #         env:
    #             MYSQL_ROOT_PASSWORD: test_password
    #             MYSQL_DATABASE: test_db
    #         ports:
    #             - 3306:3306
    #         options: >-
    #             --health-cmd="healthcheck.sh --connect --innodb_initialized"
    #             --health-interval=10s
    #             --health-timeout=5s
    #             --health-retries=3

    strategy:
      fail-fast: false
      matrix:
        php: [8.2, 8.3]
        experimental: [false]
        include:
          - php: 8.3
            analysis: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          #extensions: pdo, pdo_mysql, mbstring
          extensions: pdo, mbstring
          coverage: xdebug

      - name: Copy .env
        run: cp .env.example .env

      - name: Set environment variables
        run: |
          echo "JWT_SECRET=test-secret-key-for-ci-at-least-32-characters-long" >> $GITHUB_ENV
          echo "JWT_EXPIRATION=3600" >> $GITHUB_ENV
          echo "REFRESH_TOKEN_EXPIRATION=2592000" >> $GITHUB_ENV
          echo "APP_ENV=testing" >> $GITHUB_ENV
          # Uncomment when testing with database
          # echo "DB_HOST=127.0.0.1" >> $GITHUB_ENV
          # echo "DB_PORT=3306" >> $GITHUB_ENV
          # echo "DB_NAME=test_db" >> $GITHUB_ENV
          # echo "DB_USER=root" >> $GITHUB_ENV
          # echo "DB_PASSWORD=test_password" >> $GITHUB_ENV

      - name: Install dependencies with Composer
        uses: ramsey/composer-install@v3

      # Uncomment when you have database tests
      # - name: Wait for MySQL
      #   run: |
      #       while ! mysqladmin ping -h127.0.0.1 -uroot -ptest_password --silent; do
      #           echo "Waiting for MySQL..."
      #           sleep 2
      #       done

      # Uncomment when you have migrations
      # - name: Run migrations
      #   run: php bin/migrate.php

      - name: Coding standards
        if: matrix.analysis
        run: vendor/bin/phpcs

      - name: Static analysis
        if: matrix.analysis
        run: vendor/bin/phpstan

      - name: Tests
        run: vendor/bin/phpunit --coverage-clover clover.xml

      - name: Upload coverage results to Coveralls
        if: matrix.analysis
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          composer require php-coveralls/php-coveralls -n -W
          vendor/bin/php-coveralls --coverage_clover=clover.xml -v